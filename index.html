<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/x8JcPL9w/ey-Jp-ZCI6-Im1f-Nm-E0-NGFh-NTRj-OGU4-ODE5-MTg4-N2-Fh-YTA0-Njk1-NDA4-Zjk6c2-Vka-W1lbn-Q6-Ly84-ZTZi-Nj-A2-Yj-A1-ZDli.jpg" alt="Attendance Tracker">
        <h1>Attendance Tracker</h1>

        <input type="text" id="name" placeholder="Enter Student Name">

        <div class="buttons">
            <button id="presentBtn">Present</button>
            <button id="absentBtn">Absent</button>
        </div>

        <div class="summary">
            <p>Total : <span id="total">0</span></p>
            <p>Present : <span id="present">0</span></p>
            <p>Absent : <span id="absent">0</span></p>
        </div>

        <h2>Student List</h2>

        <ul id="studentList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
