<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="style.css">

    <script>
        if(localStorage.getItem("login")==null){
            window.location.href="login.html";
        }
    </script>

</head>
<body>

<div class="container">

    <img src="https://i.ibb.co/x8JcPL9w/ey-Jp-ZCI6-Im1f-Nm-E0-NGFh-NTRj-OGU4-ODE5-MTg4-N2-Fh-YTA0-Njk1-NDA4-Zjk6c2-Vka-W1lbn-Q6-Ly84-ZTZi-Nj-A2-Yj-A1-ZDli.jpg" alt="Attendance">

    <h1>Attendance Tracker</h1>

    <h3 id="userName"></h3>

    <button id="logout">Logout</button>

    <input
        type="text"
        id="name"
        placeholder="Enter Student Name"
    >

    <div class="btn">

        <button id="presentBtn">
            Present
        </button>

        <button id="absentBtn">
            Absent
        </button>

    </div>

    <div class="count">

        <h3>Total :
            <span id="total">0</span>
        </h3>

        <h3>Present :
            <span id="present">0</span>
        </h3>

        <h3>Absent :
            <span id="absent">0</span>
        </h3>

    </div>

    <ul id="studentList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
